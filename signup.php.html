<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - CareerPilot</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

<div class="form-box">

<h1>Create Account</h1>

<form>

<input type="text"
placeholder="Full Name"
required>

<input type="email"
placeholder="Email"
required>

<input
type="password"
placeholder="Password"
id="password"
required>

<input
type="password"
placeholder="Confirm Password"
id="confirmPassword"
required>

<button type="submit">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>

</form>

</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
