<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareerPilot</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>Welcome Back</h1>
        <p>Login to continue</p>

        <form>

            <input
            type="email"
            placeholder="Email"
            id="email"
            required>

            <div class="password-box">

                <input
                type="password"
                placeholder="Password"
                id="password"
                required>

                <span id="togglePassword">
                    👁
                </span>

            </div>

            <button type="submit">
                Login
            </button>

            <p>
                Don't have an account?
                <a href="signup.html">
                    Sign Up
                </a>
            </p>

        </form>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
