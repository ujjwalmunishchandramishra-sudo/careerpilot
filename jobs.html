<!DOCTYPE html>
<html>
<head>

<title>Job Tracker</title>

<link rel="stylesheet"
href="css/jobs.css">

</head>

<body>

<div class="page-header">

    <div>

        <h1>📊 My Job Tracker</h1>

        <p>
            Track all your internship and job applications in one place.
        </p>

    </div>

</div>


<div class="input-card">

    <div class="input-section">

        <input
        type="text"
        id="company"
        placeholder="🏢 Company Name">

        <input
        type="text"
        id="role"
        placeholder="💼 Job Role">

        <select id="status">

            <option>Applied</option>
            <option>OA</option>
            <option>Interview</option>
            <option>Offer</option>
            <option>Rejected</option>

        </select>

        <button onclick="addJob()">

            ➕ Add Job

        </button>

    </div>

</div>

<input
type="text"
id="search"
placeholder="Search Company">

<table>

<thead>

<tr>

<th>Company</th>

<th>Role</th>

<th>Status</th>

<th>Delete</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script src="js/jobs.js"></script>

</body>
</html>
